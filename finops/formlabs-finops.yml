meters:
- name: api_requests
  description: Web API and Local API requests. Not billed - the developer API is free for printer owners.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api
- name: resin_volume_dispensed_ml
  description: Resin dispensed from cartridges per print, the main per-job material cost driver; derivable from print and cartridge data via the Web API.
  unit: milliliters
  aggregation: sum
  dimensions:
  - account
  - printer
  - material
- name: print_count
  description: Completed prints, useful for amortizing hardware and tank cost per job.
  unit: prints
  aggregation: sum
  dimensions:
  - account
  - printer
- name: tank_layer_usage
  description: Layers / print-time accumulated on a resin tank, driving tank replacement (wear) cost.
  unit: layers
  aggregation: sum
  dimensions:
  - account
  - tank
- name: hardware_purchase
  description: One-time printer hardware purchase (capex), allocated over its useful life.
  unit: units
  aggregation: sum
  dimensions:
  - account
  - machine_type
principles:
- name: Visibility
  description: Use the Web API (prints, consumables, events) to export job-level material and printer usage into reporting/ERP/MES systems.
- name: Allocation
  description: Use printer groups and print metadata (user, group, labels) to attribute material and machine cost to teams and projects.
- name: Optimization
  description: Optimize orientation/supports (Local API) to reduce resin and print time; track tank wear to plan replacements; right-size the printer fleet to demand.
- name: Accountability
  description: Assign printer/group owners; review per-job material spend and hardware utilization against budget.

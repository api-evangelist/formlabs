serviceCategory: Manufacturing and Hardware
billingModel:
  pricingCategory: Purchase
  billingFrequency: Per Order
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: Formlabs Developer Platform
  ServiceCategory: Manufacturing and Hardware
  ProviderName: Formlabs
  PublisherName: Formlabs
  InvoiceIssuerName: Formlabs
  BillingCurrency: USD

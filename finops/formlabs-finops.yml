description: >-
  FinOps view of Formlabs spend. The developer platform (Web API and Local API)
  is free for printer owners and carries no usage-based API charge, so there is
  no metered API cost stream to allocate. The relevant spend is capital and
  consumable: 3D printer hardware (capex), resin cartridges and SLS powder
  (variable material cost per print), resin tanks (wear consumable), and any
  software/service subscriptions. The Web API is itself a FinOps enabler - print,
  consumable, and event data can be exported to attribute material cost per job,
  team, or department.
notes: >-
  No API-metered billing exists; cost columns describe hardware and materials.
  Material and hardware prices vary by region and reseller - verify on
  formlabs.com during reconciliation.
sources:

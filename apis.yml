    type: APIReference
  - url: https://github.com/Formlabs/formlabs-api-python
    type: SDK
  description: Local-network REST API served by the PreFormServer application for
    automating job preparation (import, auto-orient, auto-support, auto-layout,
    hollow, label), scene management, print-time estimation, and sending jobs to
    a printer or Fleet Control without launching the PreForm GUI.

aid: formlabs
url: https://raw.githubusercontent.com/api-evangelist/formlabs/refs/heads/main/apis.yml
name: Formlabs
kind: company
description: Formlabs designs and manufactures desktop and industrial 3D printers
  (SLA and SLS), materials, and software (PreForm, Dashboard). Its developer platform
  exposes the Formlabs Web API (Dashboard Developer API) for remote monitoring and
  management of Internet-connected printers, prints, consumables, events, and printer
  groups, plus a Local API (PreFormServer) for local-network job preparation and
  printer control.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- 3D Printing
- Additive Manufacturing
- SLA
- SLS
- Hardware
- Dashboard
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
